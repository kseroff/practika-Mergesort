name: Build Visual Studio C++ project

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'src/mergesort/**'
      - '.github/workflows/build-visual-studio.yml'

  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'src/mergesort/**'
      - '.github/workflows/build-visual-studio.yml'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build mergesort Windows Release
    runs-on: windows-2022

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Find mergesort solution and project files
        shell: pwsh
        run: |
          $expectedSolutionDir = "src/mergesort"
          $expectedProjectDir = "src/mergesort/mergesort"

          Write-Host "Expected solution directory: $expectedSolutionDir"
          Write-Host "Expected project directory: $expectedProjectDir"

          if (!(Test-Path $expectedSolutionDir)) {
            throw "Directory not found: $expectedSolutionDir"
          }

          if (!(Test-Path $expectedProjectDir)) {
            throw "Directory not found: $expectedProjectDir"
          }

          $solutionFiles = Get-ChildItem -Path $expectedSolutionDir -Filter "*.sln" -File

          if ($solutionFiles.Count -eq 0) {
            throw "No .sln file found in $expectedSolutionDir. Expected something like: src/mergesort/mergesort.sln"
          }

          if ($solutionFiles.Count -gt 1) {
            Write-Host "Found several .sln files:"
            $solutionFiles | ForEach-Object { Write-Host $_.FullName }
            throw "Expected exactly one .sln file in $expectedSolutionDir"
          }

          $projectFiles = Get-ChildItem -Path $expectedProjectDir -Filter "*.vcxproj" -File

          if ($projectFiles.Count -eq 0) {
            throw "No .vcxproj file found in $expectedProjectDir. Expected something like: src/mergesort/mergesort/mergesort.vcxproj"
          }

          if ($projectFiles.Count -gt 1) {
            Write-Host "Found several .vcxproj files:"
            $projectFiles | ForEach-Object { Write-Host $_.FullName }
            throw "Expected exactly one .vcxproj file in $expectedProjectDir"
          }

          $solutionFile = $solutionFiles[0].FullName
          $solutionDir = Split-Path $solutionFile -Parent
          $projectFile = $projectFiles[0].FullName
          $projectDir = Split-Path $projectFile -Parent

          Write-Host "Using solution file: $solutionFile"
          Write-Host "Using project file: $projectFile"

          "SOLUTION_FILE=$solutionFile" >> $env:GITHUB_ENV
          "SOLUTION_DIR=$solutionDir" >> $env:GITHUB_ENV
          "PROJECT_FILE=$projectFile" >> $env:GITHUB_ENV
          "PROJECT_DIR=$projectDir" >> $env:GITHUB_ENV

      - name: Detect Release platform
        shell: pwsh
        run: |
          $solutionText = Get-Content "$env:SOLUTION_FILE" -Raw

          if ($solutionText -match "Release\|x64") {
            $platform = "x64"
          }
          elseif ($solutionText -match "Release\|Win32") {
            $platform = "Win32"
          }
          else {
            Write-Host "Solution configurations found:"
            Select-String -Path "$env:SOLUTION_FILE" -Pattern "Release\|" | ForEach-Object { Write-Host $_.Line }
            throw "No Release|x64 or Release|Win32 configuration found in solution."
          }

          Write-Host "Selected build configuration: Release|$platform"

          "BUILD_CONFIGURATION=Release" >> $env:GITHUB_ENV
          "BUILD_PLATFORM=$platform" >> $env:GITHUB_ENV

      - name: Restore solution
        shell: pwsh
        run: |
          msbuild "$env:SOLUTION_FILE" /t:Restore /p:Configuration="$env:BUILD_CONFIGURATION" /p:Platform="$env:BUILD_PLATFORM"

      - name: Build solution
        shell: pwsh
        run: |
          msbuild "$env:SOLUTION_FILE" /m /p:Configuration="$env:BUILD_CONFIGURATION" /p:Platform="$env:BUILD_PLATFORM"

      - name: Find built executable
        shell: pwsh
        run: |
          Write-Host "Searching executable in project directory:"
          Write-Host "$env:PROJECT_DIR"

          $exeFiles = Get-ChildItem -Path "$env:PROJECT_DIR" -Filter "*.exe" -Recurse |
            Where-Object {
              $_.FullName -match "\\$env:BUILD_PLATFORM\\$env:BUILD_CONFIGURATION\\" -or
              $_.FullName -match "\\$env:BUILD_CONFIGURATION\\"
            }

          if ($exeFiles.Count -eq 0) {
            Write-Host "No .exe found in common output folders. Searching inside src/mergesort..."
            $exeFiles = Get-ChildItem -Path "src/mergesort" -Filter "*.exe" -Recurse
          }

          if ($exeFiles.Count -eq 0) {
            throw "Build finished, but no .exe file was found."
          }

          Write-Host "Found exe files:"
          $exeFiles | ForEach-Object { Write-Host $_.FullName }

          $exe = $exeFiles[0]

          New-Item -ItemType Directory -Force -Path "package" | Out-Null
          Copy-Item $exe.FullName -Destination "package"

          "APP_EXE=$($exe.Name)" >> $env:GITHUB_ENV

          Write-Host "Selected exe: $($exe.FullName)"
          Write-Host "Exe name: $($exe.Name)"

      - name: Create zip package
        shell: pwsh
        run: |
          $branchName = "${{ github.ref_name }}"
          $zipName = "mergesort-windows-$branchName.zip"

          Compress-Archive -Path "package/*" -DestinationPath $zipName -Force

          "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

          Write-Host "Created package: $zipName"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: mergesort-windows-${{ github.ref_name }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 14

      - name: Publish develop latest prerelease
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        shell: pwsh
        run: |
          Write-Host "Publishing develop-latest prerelease..."

          gh release delete develop-latest --yes --cleanup-tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous develop-latest release found or delete failed. Continuing..."
          }

          gh release create develop-latest `
            "$env:ZIP_NAME" `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "Develop latest build" `
            --notes "Автоматическая сборка проекта mergesort из ветки develop. Commit: $env:GITHUB_SHA" `
            --prerelease

      - name: Publish main latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          Write-Host "Publishing main-latest release..."

          gh release delete main-latest --yes --cleanup-tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous main-latest release found or delete failed. Continuing..."
          }

          gh release create main-latest `
            "$env:ZIP_NAME" `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "Main latest build" `
            --notes "Автоматическая сборка проекта mergesort из ветки main. Commit: $env:GITHUB_SHA"
