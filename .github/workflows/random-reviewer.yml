name: Assign random reviewer

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
    branches:
      - develop
      - main

permissions:
  pull-requests: write
  contents: read

jobs:
  assign-reviewer:
    name: Assign random reviewer
    runs-on: ubuntu-latest

    steps:
      - name: Pick random reviewer
        uses: actions/github-script@v7
        with:
          script: |
            const reviewers = [
              "Aleksandr-off",
              "Eternalhate322",
              "kseroff"
            ];

            const pr = context.payload.pull_request;

            if (pr.draft) {
              core.info("Pull request is draft. Skipping reviewer assignment.");
              return;
            }

            const author = pr.user.login.toLowerCase();

            const candidates = reviewers.filter(
              reviewer => reviewer.toLowerCase() !== author
            );

            if (candidates.length === 0) {
              core.warning("No reviewers available after excluding PR author.");
              return;
            }

            const selected = candidates[Math.floor(Math.random() * candidates.length)];

            core.info(`PR author: ${pr.user.login}`);
            core.info(`Selected reviewer: ${selected}`);

            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              reviewers: [selected]
            });
