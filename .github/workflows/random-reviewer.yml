name: Assign required reviewers

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
    branches:
      - develop
      - main

permissions:
  pull-requests: write
  contents: read

jobs:
  assign-reviewers:
    name: Assign required reviewers
    runs-on: ubuntu-latest

    steps:
      - name: Pick two reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const admin = "kseroff";

            const developers = [
              "Aleksandr-off",
              "Eternalhate322"
            ];

            const pr = context.payload.pull_request;

            if (pr.draft) {
              core.info("Pull request is draft. Skipping reviewer assignment.");
              return;
            }

            const author = pr.user.login;
            const authorLower = author.toLowerCase();

            let reviewers = [];

            if (authorLower === "aleksandr-off") {
              reviewers = ["Eternalhate322", admin];
            } else if (authorLower === "eternalhate322") {
              reviewers = ["Aleksandr-off", admin];
            } else if (authorLower === admin.toLowerCase()) {
              reviewers = developers;
            } else {
              reviewers = [admin, ...developers];
            }

            reviewers = reviewers.filter(
              reviewer => reviewer.toLowerCase() !== authorLower
            );

            reviewers = [...new Set(reviewers)];

            if (reviewers.length === 0) {
              core.warning("No reviewers available after excluding PR author.");
              return;
            }

            core.info(`PR author: ${author}`);
            core.info(`Reviewers: ${reviewers.join(", ")}`);

            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              reviewers: reviewers
            });
